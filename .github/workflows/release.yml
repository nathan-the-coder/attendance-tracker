name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type (only for manual trigger)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

env:
  flutter-version: '3.41.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Cache pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
          key: ${{ runner.os }}-flutter-${{ env.flutter-version }}-${{ hashFiles('**/pubspec.lock') }}

      - name: Get dependencies
        run: flutter pub get

      - name: Run static analysis
        run: flutter analyze --no-fatal-infos

      - name: Determine version
        id: version
        run: |
          # Check if this was triggered by a tag push
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Auto-triggered by tag: use the tag version directly
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            NEW_VERSION="${TAG_NAME#v}"
            VERSION_CODE=$(echo $NEW_VERSION | awk -F. '{print $1*10000 + $2*100 + $3}')
            echo "Triggered by tag: $TAG_NAME"
          else
            # Manual trigger: calculate next version
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            echo "Latest tag: $LATEST_TAG"
            
            VERSION_TYPE=${{ github.event.inputs.version_type }}
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST_TAG:1}"
            MAJOR=${MAJOR:-0}
            MINOR=${MINOR:-0}
            PATCH=${PATCH:-0}
            
            case $VERSION_TYPE in
              major) ((MAJOR++)); MINOR=0; PATCH=0 ;;
              minor) ((MINOR++)); PATCH=0 ;;
              patch) ((PATCH++)) ;;
            esac
            
            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          fi
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag_name=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "release_name=Release v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update version in pubspec.yaml
        run: |
          sed -i 's/^version: .*/version: ${{ steps.version.outputs.new_version }}+1/' pubspec.yaml
          cat pubspec.yaml | grep "^version:"

      - name: Build APK (Release)
        run: |
          flutter build apk --release \
            --target-platform android-arm,android-arm64 \
            --obfuscate \
            --split-debug-info=./build/debug-info

      - name: Build App Bundle
        run: |
          flutter build appbundle --release \
            --target-platform android-arm,android-arm64 \
            --obfuscate \
            --split-debug-info=./build/debug-info

      - name: Commit and tag (manual only)
        if: github.event.inputs.version_type != ''
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          git add pubspec.yaml
          git commit -m "Bump version to ${{ steps.version.outputs.new_version }}"
          git tag ${{ steps.version.outputs.tag_name }}
          git push --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug symbols
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols-${{ steps.version.outputs.new_version }}
          path: build/debug-info/
          retention-days: 30
