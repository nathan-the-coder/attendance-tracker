name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

env:
  flutter-version: '3.41.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Cache pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
          key: ${{ runner.os }}-flutter-${{ env.flutter-version }}-${{ hashFiles('**/pubspec.lock') }}

      - name: Get dependencies
        run: flutter pub get

      - name: Run static analysis
        run: flutter analyze --no-fatal-infos

      - name: Determine version
        id: version
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          
          VERSION_TYPE=${{ github.event.inputs.version_type }}
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST_TAG:1}"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          
          case $VERSION_TYPE in
            major) ((MAJOR++)); MINOR=0; PATCH=0 ;;
            minor) ((MINOR++)); PATCH=0 ;;
            patch) ((PATCH++)) ;;
          esac
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag_name=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "release_name=Release v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update version in pubspec.yaml
        run: |
          sed -i 's/^version: .*/version: ${{ steps.version.outputs.new_version }}+1/' pubspec.yaml
          cat pubspec.yaml | grep "^version:"

      - name: Update version in build.gradle.kts
        run: |
          cd android/app
          # Get current versionName and replace
          sed -i "s/versionName = \".*\"/versionName = \"${{ steps.version.outputs.new_version }}\"/" build.gradle.kts
          # Get current versionCode and replace
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ steps.version.outputs.version_code }}/" build.gradle.kts
          cd ../..
          cat android/app/build.gradle.kts | grep -E "versionName|versionCode"

      - name: Build APK (Release)
        run: |
          flutter build apk --release \
            --target-platform android-arm,android-arm64 \
            --obfuscate \
            --split-debug-info=./build/debug-info

      - name: Build App Bundle
        run: |
          flutter build appbundle --release \
            --target-platform android-arm,android-arm64 \
            --obfuscate \
            --split-debug-info=./build/debug-info

      - name: Commit and tag
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          git add pubspec.yaml android/app/build.gradle.kts
          git commit -m "Bump version to ${{ steps.version.outputs.new_version }}"
          git tag ${{ steps.version.outputs.tag_name }}
          git push --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug symbols
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols-${{ steps.version.outputs.new_version }}
          path: build/debug-info/
          retention-days: 30
